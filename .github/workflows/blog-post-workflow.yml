name: Update README with latest content

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCfxIu2YA2QjhvaTP9yr_Naw,https://medium.com/feed/@dhephmir"
          max_post_count: 5
          comment_tag_name: "YOUTUBE"
          gh_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@dhephmir"
          max_post_count: 5
          comment_tag_name: "BLOG"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
